<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px 60px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #2d3748; margin-bottom: 8px; }
    p  { color: #718096; }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 14px;
      background: #48bb78;
      color: white;
      border-radius: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from Docker!</h1>
    <p>Deployed via Jenkins pipeline to AWS EC2</p>
    <span class="badge">Running</span>
  </div>
</body>
</html>
